<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no"/>
<title>Healzy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lobster&display=block" rel="stylesheet">
<style>
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background: #0A1F36;
    overflow: hidden;
    font-family: 'Lobster', cursive;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  #root { width: 100vw; height: 100vh; display: block; }
  svg {
    display: block; width: 100%; height: 100%;
    shape-rendering: geometricPrecision;
  }
</style>
</head>
<body>
<div id="root"></div>
<script>
(function () {
  const MIDNIGHT = '#0A1F36';
  const MID_SOFT = '#102E4A';
  const CYAN = '#1B4965';
  const CYAN_SOFT = '#2E6B8E';
  const PEARL = '#F5E9D4';

  const SVG_NS = 'http://www.w3.org/2000/svg';
  const root = document.getElementById('root');

  const w = window.innerWidth;
  const h = window.innerHeight;

  const svg = document.createElementNS(SVG_NS, 'svg');
  svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
  svg.setAttribute('preserveAspectRatio', 'xMidYMid slice');
  svg.style.background = MIDNIGHT;
  root.appendChild(svg);

  const defs = document.createElementNS(SVG_NS, 'defs');
  defs.innerHTML = `
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="${CYAN}" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="${CYAN}" stop-opacity="0"/>
    </radialGradient>`;
  svg.appendChild(defs);

  const ringsLayer = document.createElementNS(SVG_NS, 'g');
  const glowLayer = document.createElementNS(SVG_NS, 'g');
  const dropletLayer = document.createElementNS(SVG_NS, 'g');
  const wordLayer = document.createElementNS(SVG_NS, 'g');
  const taglineLayer = document.createElementNS(SVG_NS, 'text');
  svg.appendChild(ringsLayer);
  svg.appendChild(glowLayer);
  svg.appendChild(dropletLayer);
  svg.appendChild(wordLayer);
  svg.appendChild(taglineLayer);

  const cx = w / 2, cy = h / 2;
  const maxR = Math.hypot(w, h) * 0.75;
  const fontSize = Math.min(w, h) * 0.24;

  function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
  function easeOutQuint(t) { return 1 - Math.pow(1 - t, 5); }
  function springOut(t) {
    if (t <= 0) return 0;
    if (t >= 1) return 1;
    const c = 1.70158 * 1.2;
    return 1 + (c + 1) * Math.pow(t - 1, 3) + c * Math.pow(t - 1, 2);
  }

  // Reduced points for perf (60 instead of 120)
  function wavyPath(cx, cy, radius, bumps, wobble, seed) {
    const points = 56;
    let d = '';
    for (let i = 0; i <= points; i++) {
      const t = (i / points) * Math.PI * 2;
      const r = radius * (1 + Math.sin(t * bumps + seed) * wobble);
      const x = cx + Math.cos(t) * r;
      const y = cy + Math.sin(t) * r;
      d += (i === 0 ? 'M' : 'L') + x.toFixed(1) + ' ' + y.toFixed(1) + ' ';
    }
    return d + 'Z';
  }

  function blobPath(cx, cy, radius, bumps, wobble, seed) {
    const points = 36;
    let d = '';
    for (let i = 0; i <= points; i++) {
      const t = (i / points) * Math.PI * 2;
      const r = radius * (1 + Math.sin(t * bumps + seed) * wobble + Math.cos(t * (bumps + 1) + seed * 2) * wobble * 0.5);
      const x = cx + Math.cos(t) * r;
      const y = cy + Math.sin(t) * r;
      d += (i === 0 ? 'M' : 'L') + x.toFixed(1) + ' ' + y.toFixed(1) + ' ';
    }
    return d + 'Z';
  }

  // wordmark layout
  const letters = ['h','e','a','l','z','y'];
  const glyphW = { h: 0.78, e: 0.44, a: 0.48, l: 0.26, z: 0.44, y: 0.46 };
  const kern = 0.015 * fontSize;
  const widths = letters.map(l => glyphW[l] * fontSize);
  const totalW = widths.reduce((s, w) => s + w, 0) + kern * (letters.length - 1);
  let xCursor = cx - totalW / 2;
  const positions = letters.map((l, i) => {
    const x = xCursor;
    xCursor += widths[i] + kern;
    return { l: l, x: x, y: cy + fontSize * 0.25, w: widths[i] };
  });

  const letterEls = positions.map((p, i) => {
    const g = document.createElementNS(SVG_NS, 'g');
    if (i === 0) {
      // 'h' slot replaced with app icon — matches Claude Design source
      const logoSize = fontSize * 1.25;
      const logoX = p.x + p.w / 2 - logoSize / 2;
      const logoY = p.y - fontSize * 0.92;
      const img = document.createElementNS(SVG_NS, 'image');
      img.setAttributeNS('http://www.w3.org/1999/xlink', 'href', 'icon.png');
      img.setAttribute('href', 'icon.png');
      img.setAttribute('x', logoX);
      img.setAttribute('y', logoY);
      img.setAttribute('width', logoSize);
      img.setAttribute('height', logoSize);
      img.setAttribute('preserveAspectRatio', 'xMidYMid meet');
      g.appendChild(img);
    } else {
      const t = document.createElementNS(SVG_NS, 'text');
      t.setAttribute('x', p.x);
      t.setAttribute('y', p.y);
      t.setAttribute('fill', '#fff');
      t.setAttribute('font-family', "'Lobster', cursive");
      t.setAttribute('font-size', fontSize);
      t.textContent = p.l;
      g.appendChild(t);
    }
    g.setAttribute('opacity', '0');
    wordLayer.appendChild(g);
    return { g: g, p: p };
  });

  taglineLayer.setAttribute('x', cx);
  taglineLayer.setAttribute('y', cy + fontSize * 0.95);
  taglineLayer.setAttribute('text-anchor', 'middle');
  taglineLayer.setAttribute('font-family', "'Lobster', cursive");
  taglineLayer.setAttribute('font-size', fontSize * 0.25);
  taglineLayer.setAttribute('fill', '#fff');
  taglineLayer.setAttribute('letter-spacing', '0.4');
  taglineLayer.setAttribute('opacity', '0');
  taglineLayer.textContent = 'sağlığınız için dijital köprü';

  const glowCircle = document.createElementNS(SVG_NS, 'circle');
  glowCircle.setAttribute('cx', cx);
  glowCircle.setAttribute('cy', cy);
  glowCircle.setAttribute('r', maxR * 0.5);
  glowCircle.setAttribute('fill', 'url(#centerGlow)');
  glowCircle.setAttribute('opacity', '0');
  glowLayer.appendChild(glowCircle);

  const dropletPath = document.createElementNS(SVG_NS, 'path');
  dropletPath.setAttribute('fill', CYAN);
  dropletPath.setAttribute('opacity', '0');
  dropletLayer.appendChild(dropletPath);

  const ringConfigs = [
    { color: CYAN,      bumps: 10, wobble: 0.06, delay: 0.00, seed: 0.3 },
    { color: MID_SOFT,  bumps: 9,  wobble: 0.07, delay: 0.08, seed: 1.2 },
    { color: CYAN_SOFT, bumps: 11, wobble: 0.05, delay: 0.16, seed: 2.1 },
    { color: PEARL,     bumps: 8,  wobble: 0.08, delay: 0.24, seed: 3.4 },
  ];

  // Draw outer first, inner on top
  const ringEls = ringConfigs.slice().reverse().map((r, idx) => {
    const i = ringConfigs.length - 1 - idx;
    const g = document.createElementNS(SVG_NS, 'g');
    const p = document.createElementNS(SVG_NS, 'path');
    p.setAttribute('fill', r.color);
    g.setAttribute('opacity', '0');
    g.appendChild(p);
    ringsLayer.appendChild(g);
    return { g: g, p: p, cfg: r, index: i };
  });

  function render(t) {
    const ringStart = 1.10;
    const ringDuration = 0.70;
    const letterStart = 1.80;
    const letterDuration = 0.30;

    const hP = clamp((t - 0.30) / 0.30, 0, 1);
    const hEase = springOut(hP);

    for (let i = 0; i < letterEls.length; i++) {
      const L = letterEls[i];
      const p = L.p;
      if (i === 0) {
        L.g.setAttribute('opacity', hP);
        const tY = (1 - hEase) * 8;
        const sc = 0.85 + 0.15 * hEase;
        L.g.setAttribute('transform',
          'translate(' + (p.x + p.w / 2) + ' ' + p.y + ') ' +
          'scale(' + sc.toFixed(3) + ') ' +
          'translate(' + (-(p.x + p.w / 2)).toFixed(1) + ' ' + ((-(p.y) + tY)).toFixed(1) + ')');
      } else {
        const delay = (i - 1) * 0.06;
        const lp = clamp((t - letterStart - delay) / letterDuration, 0, 1);
        const eased = springOut(lp);
        const tY = (1 - eased) * 40;
        const sc = 0.9 + 0.1 * eased;
        L.g.setAttribute('opacity', lp);
        L.g.setAttribute('transform',
          'translate(' + (p.x + p.w / 2) + ' ' + p.y + ') ' +
          'scale(' + sc.toFixed(3) + ') ' +
          'translate(' + (-(p.x + p.w / 2)).toFixed(1) + ' ' + ((-(p.y) + tY)).toFixed(1) + ')');
      }
    }

    const dropP = clamp((t - 0.90) / 0.20, 0, 1);
    if (dropP > 0 && t < 1.35) {
      const dropR = dropP * 40;
      const dropCx = cx + 30;
      const dropCy = cy + 22;
      dropletPath.setAttribute('d', blobPath(dropCx, dropCy, dropR, 6, 0.15, 0.7));
      dropletPath.setAttribute('opacity', Math.max(0, 1 - clamp((t - 1.10) / 0.20, 0, 1)));
    } else if (dropletPath.getAttribute('opacity') !== '0') {
      dropletPath.setAttribute('opacity', '0');
    }

    for (let k = 0; k < ringEls.length; k++) {
      const R = ringEls[k];
      const r = R.cfg;
      const i = R.index;
      const rp = clamp((t - ringStart - r.delay) / ringDuration, 0, 1);
      if (rp <= 0) {
        if (R.g.getAttribute('opacity') !== '0') R.g.setAttribute('opacity', '0');
        continue;
      }
      const eased = easeOutQuint(rp);
      const finalR = maxR * (0.35 + i * 0.22);
      let radius = finalR * eased;

      if (i === 0 && t >= 2.45) {
        radius *= (1 + 0.03 * Math.sin((t - 2.45) * Math.PI * 2 / 1.5));
      }

      const ringOpacity = i === 3 ? Math.min(rp * 1.2, 1) * 0.85 : 1;
      R.g.setAttribute('opacity', ringOpacity);
      R.p.setAttribute('d', wavyPath(cx, cy, radius, r.bumps, r.wobble, r.seed));
    }

    if (t > 1.6) {
      glowCircle.setAttribute('opacity', clamp((t - 1.6) / 0.4, 0, 1));
    }

    const tagP = clamp((t - 2.20) / 0.25, 0, 1);
    taglineLayer.setAttribute('opacity', tagP * 0.85);
  }

  let startTime = null;
  const DURATION = 2.8;
  const HOLD_AFTER = 0.6; // after 2.8s breathe a bit, then signal done
  let signaled = false;

  function tick(now) {
    if (startTime === null) startTime = now;
    const t = (now - startTime) / 1000;
    render(Math.min(t, DURATION + HOLD_AFTER));
    if (t < DURATION + HOLD_AFTER) {
      requestAnimationFrame(tick);
    } else if (!signaled) {
      signaled = true;
      try {
        if (window.SplashDone && typeof window.SplashDone.postMessage === 'function') {
          window.SplashDone.postMessage('done');
        }
      } catch (e) {}
    }
  }

  // Start only after font is loaded (Lobster) so text renders correctly from t=0
  function start() {
    // initial paint at t=0 so screen is not blank
    render(0);
    requestAnimationFrame(function (now) {
      startTime = now;
      tick(now);
    });
  }

  if (document.fonts && document.fonts.ready) {
    // Also cap font wait at 1200ms so animation starts even on slow networks
    const fontWaitCap = new Promise(function (resolve) {
      setTimeout(resolve, 1200);
    });
    Promise.race([document.fonts.ready, fontWaitCap]).then(start);
  } else {
    start();
  }
})();
</script>
</body>
</html>
